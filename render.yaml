services:
  - type: web
    name: engineering-assistant-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"s
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
